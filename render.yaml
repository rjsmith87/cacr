services:
  - type: web
    name: cacr-api
    runtime: python
    plan: starter
    buildCommand: pip install -r requirements-api.txt
    startCommand: gunicorn api.main:app --bind 0.0.0.0:$PORT --workers 1 --threads 4 --worker-class gthread --timeout 180 --max-requests 200 --max-requests-jitter 50
    envVars:
      - key: GCP_PROJECT
        sync: false
      - key: GOOGLE_API_KEY
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: GOOGLE_APPLICATION_CREDENTIALS_JSON
        sync: false

  - type: web
    name: cacr-dashboard
    runtime: static
    plan: free
    buildCommand: cd dashboard && npm install && npm run build
    staticPublishPath: dashboard/dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    headers:
      - path: /assets/*
        name: Cache-Control
        value: public, max-age=31536000, immutable
      - path: /index.html
        name: Cache-Control
        value: no-cache
    envVars:
      - key: VITE_API_URL
        sync: false
